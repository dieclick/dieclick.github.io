<script>
document.addEventListener('DOMContentLoaded', function () {
    scrollToBottom();
});

function scrollToBottom() {
    window.scrollTo({
        top: document.body.scrollHeight,
        behavior: 'smooth'
    });
}

function nextTriplet() {
    const current = document.querySelector('.image-container.active');
    const all = document.querySelectorAll('.image-container');

    let index = Array.from(all).indexOf(current);
    current.classList.remove('active');

    let nextIndex = (index + 1) % all.length;
    all[nextIndex].classList.add('active');

    scrollToBottom();
}
</script>
