<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DESTINATA Triplet B</title>

<style>
body {
    margin: 0;
    background: #000;
    overflow: hidden;
    font-family: Arial;
    color: white;
}

/* viewer */
.viewer {
    width: 100vw;
    height: 100vh;
    overflow-y: auto;
    position: relative;
}

/* images */
img {
    width: 100%;
    max-width: 1280px;
    display: block;
    margin: 0 auto;
}

/* UI */
.ui {
    position: fixed;
    top: 10px;
    left: 10px;
    z-index: 10;
    background: rgba(0,0,0,0.6);
    padding: 10px;
    border-radius: 8px;
}

button {
    margin: 0 5px;
    padding: 5px 10px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="ui">
    <button onclick="prev()">◀</button>
    <span id="label">1 / 4</span>
    <button onclick="next()">▶</button>
</div>

<div class="viewer" id="viewer"></div>

<script>
/* =========================
   DEFINE YOUR TRIPLETS HERE
========================= */
const triplets = [
  ["prepagA.png","prepagB.png","pag 00.png","pag 1.png","pag 2.png","pag 3.png","pag 4.png","pag 5.png","pag 6.png","pag 7.png","pag 8.png","pag 9.png","pag 10.png"],
  ["pag 11.png","pag 12.png","pag 13.png","pag 14.png","pag 15.png","pag 16.png","pag 17.png","pag 18.png","pag 19.png","pag 20.png"],
  ["pag 21.png","pag 22.png","pag 23.png","pag 24.png","pag 25.png","pag 26.png","pag 27.png","pag 28.png","pag 29.png","pag 30.png"],
  ["pag 31.png","pag 32.png","pag 33.png","pag 34.png","pag 35.png","pag 36.png","pag 37.png","pag 38.png","pag 39.png","pag 40.png"]
];

let current = 0;

const viewer = document.getElementById("viewer");
const label = document.getElementById("label");

/* render triplet */
function render() {
    viewer.innerHTML = "";

    triplets[current].forEach(src => {
        const img = document.createElement("img");
        img.src = src;
        img.loading = "lazy";
        viewer.appendChild(img);
    });

    label.textContent = `${current + 1} / ${triplets.length}`;

    viewer.scrollTo({ top: 0, behavior: "smooth" });
}

/* navigation */
function next() {
    if (current < triplets.length - 1) current++;
    render();
}

function prev() {
    if (current > 0) current--;
    render();
}

/* init */
render();
</script>

</body>
</html>
