<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dieclick Games</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Roboto', sans-serif;
    background: url('bgal.png') no-repeat center center fixed;
    background-size: cover;
    color: white;
}

/* Title */
header {
    text-align: center;
    padding: 40px 20px 10px;
}

header h1 {
    margin: 0;
    font-size: 2.5rem;
}

/* Grid Layout */
.games {
    display: flex;
    justify-content: center;
    gap: 30px;
    flex-wrap: wrap;
    padding: 40px;
}

/* Card */
.card {
    width: 280px;
    height: 280px;
    position: relative;
    border-radius: 15px;
    overflow: hidden;
    text-decoration: none;
    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.card:hover {
    transform: translateY(-10px) scale(1.03);
    box-shadow: 0 20px 40px rgba(0,0,0,0.6);
}

/* Image */
.card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* Overlay */
.overlay {
    position: absolute;
    bottom: 0;
    width: 100%;
    padding: 15px;
    background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
    text-align: center;
    font-weight: 500;
    font-size: 1.1rem;
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.3s ease;
}

.card:hover .overlay {
    opacity: 1;
    transform: translateY(0);
}
</style>
</head>

<body>

<header>
    <h1>Dieclick Games</h1>
</header>

<section class="games">

    <a class="card" href="https://gamejolt.com/games/PQQ/791701">
        <img src="pqqlogo.png" alt="PQQ">
        <div class="overlay">PQQ Game</div>
    </a>

    <a class="card" href="https://store.steampowered.com/app/1489160/Destinata_ROJO_COMPLETO/">
        <img src="imagen_2023-08-27_185632232.png" alt="Destinata">
        <div class="overlay">Destinata Red</div>
    </a>

    <a class="card" href="https://gamejolt.com/games/BLCKWK/860393">
        <img src="imagen_2023-08-11_224220143.png" alt="Black_Wikia">
        <div class="overlay">Black_Wikia</div>
    </a>

</section>

</body>
</html>
