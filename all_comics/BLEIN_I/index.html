<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comic</title>

<style>
body {
    margin: 0;
    background: #111;
    overflow: hidden;
    font-family: Arial, sans-serif;
}

.viewer {
    width: 100vw;
    height: 100vh;
    position: relative;
    overflow: hidden;
}

/* Horizontal track */
.track {
    display: flex;
    height: 100%;
    transition: transform 0.35s ease;
}

/* Vertical mode */
.viewer.vertical {
    overflow-y: auto;
    overflow-x: hidden;
}

.viewer.vertical .track {
    flex-direction: column;
    transform: none !important;
}

.viewer.vertical img {
    width: 100%;
    height: auto;
}

/* Pages */
.track img {
    width: 100vw;
    height: 100vh;
    object-fit: contain;
    flex-shrink: 0;
    cursor: pointer;
}

/* UI */
.ui {
    position: absolute;
    inset: 0;
    pointer-events: none;
    transition: opacity 0.3s;
}

.ui.hidden {
    opacity: 0;
}

/* Buttons */
.button {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(255,255,255,0.15);
    border: none;
    border-radius: 50%;
    width: 55px;
    height: 55px;
    color: white;
    font-size: 22px;
    cursor: pointer;
    pointer-events: auto;
}

.left { left: 20px; }
.right { right: 20px; }

.button:hover {
    background: rgba(255,255,255,0.35);
}

/* Counter */
.counter {
    position: absolute;
    top: 15px;
    left: 20px;
    color: white;
    font-size: 14px;
    opacity: 0.8;
}

/* Toggle */
.toggle {
    position: absolute;
    top: 15px;
    right: 20px;
    background: rgba(255,255,255,0.15);
    border: none;
    color: white;
    padding: 6px 10px;
    cursor: pointer;
    font-size: 12px;
    pointer-events: auto;
}

/* Progress bar */
.progress {
    position: fixed;
    bottom: 0;
    left: 0;
    height: 3px;
    background: white;
    width: 0%;
}

/* Zoom */
.zoomed {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(1.5);
    max-width: 90vw;
    max-height: 90vh;
    z-index: 50;
    cursor: zoom-out;
}
</style>

</head>

<body>

<div class="viewer" id="viewer">
    <div class="track" id="track"></div>

```
<div class="ui" id="ui">
    <button class="button left" id="prev">❮</button>
    <button class="button right" id="next">❯</button>

    <div class="counter" id="counter">1 / 1</div>
    <button class="toggle" id="toggle">VERTICAL</button>
</div>
```

</div>

<div class="progress" id="progress"></div>

<script>
/* ===== CONFIG ===== */
const comicName = "Blein I";
const totalPages = 27;
const prefix = "";
const extension = ".png";
/* ================== */

document.title = comicName;

const track = document.getElementById('track');
const viewer = document.getElementById('viewer');
const progress = document.getElementById('progress');
const counter = document.getElementById('counter');
const ui = document.getElementById('ui');

let current = 0;
let vertical = false;
let hideTimer;

/* Generate images */
for (let i = 0; i < totalPages; i++) {
    let num = i.toString().padStart(2, '0');
    let img = document.createElement('img');

    img.src = (i === 0) ? "cover" + extension : prefix + num + extension;
    track.appendChild(img);

    /* Zoom */
    img.onclick = () => {
        const zoom = document.createElement('img');
        zoom.src = img.src;
        zoom.className = 'zoomed';
        document.body.appendChild(zoom);
        zoom.onclick = () => zoom.remove();
    };
}

/* 🔥 Preload function */
function preloadAround(index) {
    const range = [-1, 1, 2];

    range.forEach(offset => {
        let i = index + offset;

        if (i >= 0 && i < totalPages) {
            let num = i.toString().padStart(2, '0');
            let src = (i === 0)
                ? "cover" + extension
                : prefix + num + extension;

            const img = new Image();
            img.src = src;
        }
    });
}

/* Update */
function update() {
    if (!vertical) {
        track.style.transform = `translateX(-${current * 100}vw)`;
    }

    counter.textContent = (current + 1) + " / " + totalPages;
    progress.style.width = (current / (totalPages - 1)) * 100 + "%";

    preloadAround(current);
}

/* Navigation */
function next() {
    if (current < totalPages - 1) current++;
    update();
}

function prev() {
    if (current > 0) current--;
    update();
}

document.getElementById('next').onclick = next;
document.getElementById('prev').onclick = prev;

/* Keyboard */
document.addEventListener('keydown', e => {
    if (e.key === "ArrowRight") next();
    if (e.key === "ArrowLeft") prev();
});

/* Swipe */
let startX = 0;

document.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
});

document.addEventListener('touchend', e => {
    let dx = e.changedTouches[0].clientX - startX;

    if (!vertical) {
        if (dx < -50) next();
        if (dx > 50) prev();
    }
});

/* Vertical mode */
document.getElementById('toggle').onclick = () => {
    vertical = !vertical;
    viewer.classList.toggle('vertical');

    document.getElementById('toggle').textContent =
        vertical ? "HORIZONTAL" : "VERTICAL";
};

/* Scroll tracking (vertical) */
viewer.addEventListener('scroll', () => {
    if (vertical) {
        let scroll = viewer.scrollTop;
        let height = viewer.clientHeight;
        current = Math.round(scroll / height);
        update();
    }
});

/* Auto-hide UI */
function showUI() {
    ui.classList.remove('hidden');

    clearTimeout(hideTimer);
    hideTimer = setTimeout(() => {
        ui.classList.add('hidden');
    }, 2000);
}

document.addEventListener('mousemove', showUI);
document.addEventListener('touchstart', showUI);

/* Init */
update();
preloadAround(0);
showUI();
</script>

</body>
</html>
