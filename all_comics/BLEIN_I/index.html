<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title id="page-title">Comic</title>

<style>
body {
    margin: 0;
    background: #111;
    overflow: hidden;
    font-family: Arial, sans-serif;
}

/* Viewer */
.viewer {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    position: relative;
}

/* Track */
.track {
    display: flex;
    height: 100%;
    transition: transform 0.35s ease;
}

/* Pages */
.track img {
    width: 100vw;
    height: 100vh;
    object-fit: contain;
    flex-shrink: 0;
    cursor: pointer;
}

/* Buttons */
.button {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(255,255,255,0.15);
    border: none;
    border-radius: 50%;
    width: 55px;
    height: 55px;
    color: white;
    font-size: 22px;
    cursor: pointer;
    z-index: 10;
}

.left { left: 20px; }
.right { right: 20px; }

.button:hover {
    background: rgba(255,255,255,0.35);
}

/* Progress bar */
.progress {
    position: fixed;
    bottom: 0;
    left: 0;
    height: 3px;
    background: white;
    width: 0%;
    z-index: 20;
}

/* Zoom */
.zoomed {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(1.5);
    max-width: 90vw;
    max-height: 90vh;
    z-index: 30;
    cursor: zoom-out;
}
</style>

</head>

<body>

<div class="viewer">
    <div class="track" id="track"></div>

```
<button class="button left" id="prev">❮</button>
<button class="button right" id="next">❯</button>
```

</div>

<div class="progress" id="progress"></div>

<script>
/* =========================
   CONFIG (EDIT THIS ONLY)
========================= */
const comicName = "Blein I";
const totalPages = 27;
const prefix = "";     // example: "page_"
const extension = ".png";

/* ========================= */

document.title = comicName;

const track = document.getElementById('track');
const progress = document.getElementById('progress');

let current = 0;

/* Generate images */
for (let i = 0; i < totalPages; i++) {
    let num = i.toString().padStart(2, '0'); // 00, 01...
    let img = document.createElement('img');

    // Cover logic (optional)
    if (i === 0) {
        img.src = "cover" + extension;
    } else {
        img.src = prefix + num + extension;
    }

    track.appendChild(img);

    /* Zoom */
    img.onclick = () => {
        const zoom = document.createElement('img');
        zoom.src = img.src;
        zoom.className = 'zoomed';
        document.body.appendChild(zoom);
        zoom.onclick = () => zoom.remove();
    };
}

/* Navigation */
function update() {
    track.style.transform = `translateX(-${current * 100}vw)`;

    let percent = (current / (totalPages - 1)) * 100;
    progress.style.width = percent + "%";
}

function next() {
    if (current < totalPages - 1) current++;
    update();
}

function prev() {
    if (current > 0) current--;
    update();
}

document.getElementById('next').onclick = next;
document.getElementById('prev').onclick = prev;

/* Keyboard */
document.addEventListener('keydown', (e) => {
    if (e.key === "ArrowRight") next();
    if (e.key === "ArrowLeft") prev();
});

/* Touch swipe (smooth, no lag) */
let startX = 0;

document.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
});

document.addEventListener('touchend', e => {
    let dx = e.changedTouches[0].clientX - startX;

    if (dx < -50) next();
    if (dx > 50) prev();
});

/* Init */
update();
</script>

</body>
</html>
