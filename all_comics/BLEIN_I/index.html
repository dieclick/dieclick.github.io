<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comic</title>

<style>
body {
    margin: 0;
    background: #111;
    overflow: hidden;
    font-family: Arial, sans-serif;
}

.viewer {
    width: 100vw;
    height: 100vh;
    position: relative;
    overflow: hidden;
}

.track {
    display: flex;
    height: 100%;
    transition: transform 0.35s ease;
}

.viewer.vertical {
    overflow-y: auto;
    overflow-x: hidden;
}

.viewer.vertical .track {
    flex-direction: column;
    transform: none !important;
}

.track img {
    width: 100vw;
    height: 100vh;
    object-fit: contain;
    flex-shrink: 0;
    cursor: pointer;
}

/* UI */
.ui {
    position: absolute;
    inset: 0;
    pointer-events: none;
    transition: opacity 0.3s;
}

.ui.hidden { opacity: 0; }

.button {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(255,255,255,0.15);
    border: none;
    border-radius: 50%;
    width: 55px;
    height: 55px;
    color: white;
    font-size: 22px;
    cursor: pointer;
    pointer-events: auto;
}

.left { left: 20px; }
.right { right: 20px; }

.button:hover { background: rgba(255,255,255,0.35); }

.counter {
    position: absolute;
    top: 15px;
    left: 20px;
    color: white;
    font-size: 14px;
    opacity: 0.8;
}

.toggle {
    position: absolute;
    top: 15px;
    right: 20px;
    background: rgba(255,255,255,0.15);
    border: none;
    color: white;
    padding: 6px 10px;
    cursor: pointer;
    font-size: 12px;
    pointer-events: auto;
}

.progress {
    position: fixed;
    bottom: 0;
    left: 0;
    height: 3px;
    background: white;
    width: 0%;
}

.zoomed {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(1.5);
    max-width: 90vw;
    max-height: 90vh;
    z-index: 50;
    cursor: zoom-out;
}
</style>
</head>

<body>

<div class="viewer" id="viewer">
    <div class="track" id="track"></div>

    <div class="ui" id="ui">
        <button class="button left" id="prev">❮</button>
        <button class="button right" id="next">❯</button>
        <div class="counter" id="counter"></div>
        <button class="toggle" id="toggle">VERTICAL</button>
    </div>
</div>

<div class="progress" id="progress"></div>

<script>
const comicName = "Blein I";
const totalPages = 27;
const prefix = "";
const extension = ".png";

document.title = comicName;

const track = document.getElementById('track');
const viewer = document.getElementById('viewer');
const progress = document.getElementById('progress');
const counter = document.getElementById('counter');
const ui = document.getElementById('ui');

let current = 0;
let vertical = false;
let hideTimer;

/* ===== build pages ===== */
const pages = [];

for (let i = 0; i < totalPages; i++) {
    let img = document.createElement('img');
    let num = i.toString().padStart(2, '0');

    img.src = (i === 0) ? "cover" + extension : prefix + num + extension;

    img.onclick = () => {
        const zoom = document.createElement('img');
        zoom.src = img.src;
        zoom.className = 'zoomed';
        document.body.appendChild(zoom);

        const close = (e) => {
            if (e.type === "click" || e.key === "Escape") {
                zoom.remove();
                document.removeEventListener('keydown', close);
            }
        };

        zoom.onclick = close;
        document.addEventListener('keydown', close);
    };

    pages.push(img);
    track.appendChild(img);
}

/* ===== preload ===== */
function preload(i) {
    [-2, -1, 1, 2].forEach(o => {
        let n = i + o;
        if (n >= 0 && n < totalPages) {
            let img = new Image();
            let num = n.toString().padStart(2, '0');
            img.src = (n === 0) ? "cover" + extension : prefix + num + extension;
        }
    });
}

/* ===== update ===== */
function update() {
    if (!vertical) {
        track.style.transform = `translateX(-${current * 100}vw)`;
    }

    counter.textContent = `${current + 1} / ${totalPages}`;
    progress.style.width = `${(current / (totalPages - 1)) * 100}%`;

    preload(current);
}

/* ===== navigation ===== */
function next() {
    if (current < totalPages - 1) current++;
    update();
}

function prev() {
    if (current > 0) current--;
    update();
}

document.getElementById('next').onclick = next;
document.getElementById('prev').onclick = prev;

/* ===== keyboard ===== */
document.addEventListener('keydown', e => {
    if (e.key === "ArrowRight") next();
    if (e.key === "ArrowLeft") prev();
});

/* ===== swipe ===== */
let startX = 0;

document.addEventListener('touchstart', e => {
    if (vertical) return;
    startX = e.touches[0].clientX;
});

document.addEventListener('touchend', e => {
    if (vertical) return;

    let dx = e.changedTouches[0].clientX - startX;

    if (dx < -50) next();
    if (dx > 50) prev();
});

/* ===== vertical toggle ===== */
document.getElementById('toggle').onclick = () => {
    vertical = !vertical;
    viewer.classList.toggle('vertical');
    document.getElementById('toggle').textContent = vertical ? "HORIZONTAL" : "VERTICAL";
    update();
};

/* ===== scroll sync (fixed) ===== */
viewer.addEventListener('scroll', () => {
    if (!vertical) return;

    let closest = 0;
    let min = Infinity;

    pages.forEach((img, i) => {
        const dist = Math.abs(img.getBoundingClientRect().top);
        if (dist < min) {
            min = dist;
            closest = i;
        }
    });

    current = closest;
    update();
});

/* ===== UI auto-hide ===== */
function showUI() {
    ui.classList.remove('hidden');
    clearTimeout(hideTimer);
    hideTimer = setTimeout(() => ui.classList.add('hidden'), 2000);
}

document.addEventListener('mousemove', showUI);
document.addEventListener('touchstart', showUI);

/* init */
update();
preload(0);
showUI();
</script>

</body>
</html>
