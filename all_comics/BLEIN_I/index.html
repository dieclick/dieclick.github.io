<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comic Reader</title>

<style>
body {
    margin: 0;
    background: #111;
    font-family: Arial, sans-serif;
    overflow: hidden;
}

/* Horizontal comic container */
.comic-container {
    display: flex;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    scroll-behavior: smooth;
    height: 100vh;
}

/* Each page */
.comic-container img {
    flex: 0 0 100vw;
    height: 100%;
    object-fit: contain;
    scroll-snap-align: center;
    cursor: pointer;
    transition: transform 0.3s;
}

/* Navigation buttons */
.button {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(255,255,255,0.15);
    border: none;
    border-radius: 50%;
    width: 55px;
    height: 55px;
    cursor: pointer;
    z-index: 10;
    color: white;
    font-size: 22px;
    backdrop-filter: blur(4px);
}

.button.left { left: 20px; }
.button.right { right: 20px; }

.button:hover {
    background: rgba(255,255,255,0.35);
}

/* Page counter */
.counter {
    position: fixed;
    bottom: 15px;
    right: 20px;
    color: white;
    font-size: 14px;
    opacity: 0.7;
}

/* Zoomed image */
.zoomed {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(1.5);
    max-width: 90vw;
    max-height: 90vh;
    z-index: 20;
    cursor: zoom-out;
    box-shadow: 0 0 40px rgba(0,0,0,0.8);
}
</style>

</head>

<body>

<div class="comic-container" id="comic">

```

```

</div>

<button class="button left" id="prev">❮</button> <button class="button right" id="next">❯</button>

<div class="counter" id="counter">1 / 1</div>

<script>
const container = document.getElementById('comic');
const images = container.querySelectorAll('img');
const counter = document.getElementById('counter');

let currentIndex = 0;

/* Scroll to page */
function goTo(index) {
    if (index < 0) index = 0;
    if (index >= images.length) index = images.length - 1;

    currentIndex = index;

    images[index].scrollIntoView({
        behavior: "smooth",
        inline: "center"
    });

    updateCounter();
}

/* Buttons */
document.getElementById('next').onclick = () => goTo(currentIndex + 1);
document.getElementById('prev').onclick = () => goTo(currentIndex - 1);

/* Update index on scroll */
container.addEventListener('scroll', () => {
    const width = container.clientWidth;
    currentIndex = Math.round(container.scrollLeft / width);
    updateCounter();
});

/* Counter */
function updateCounter() {
    counter.textContent = (currentIndex + 1) + " / " + images.length;
}

updateCounter();

/* Keyboard support */
document.addEventListener('keydown', (e) => {
    if (e.key === "ArrowRight") goTo(currentIndex + 1);
    if (e.key === "ArrowLeft") goTo(currentIndex - 1);
});

/* Click to zoom */
images.forEach(img => {
    img.addEventListener('click', () => {
        const zoom = document.createElement('img');
        zoom.src = img.src;
        zoom.className = 'zoomed';

        document.body.appendChild(zoom);

        zoom.onclick = () => zoom.remove();
    });
});
</script>

</body>
</html>
