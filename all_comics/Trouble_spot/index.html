<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trouble Spot — Chapters</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #111;
  font-family: 'Barlow', sans-serif;
  color: white;
  overflow-x: hidden;
  position: relative;
}

/* BACKGROUND IMAGE */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  z-index: -3;
  pointer-events: none;

  background: url('TS_cover.png') no-repeat center center;
  background-size: cover;
  opacity: 0.85;
}

/* STATIC + SCANLINES LAYER */
body::after {
  content: "";
  position: fixed;
  inset: 0;
  z-index: 2;
  pointer-events: none;

  /* scanlines */
  background: repeating-linear-gradient(
    to bottom,
    rgba(0, 0, 0, 0.25),
    rgba(0, 0, 0, 0.25) 1px,
    transparent 1px,
    transparent 3px
  );

  opacity: 0.2;
  mix-blend-mode: multiply;

  /* animation for movement */
  animation: scanMove 6s linear infinite;

  /* optional static overlay (adds “TV noise feel”) */
  box-shadow: inset 0 0 200px rgba(255,255,255,0.03);
}

@keyframes scanMove {
  0% { transform: translateY(0); }
  100% { transform: translateY(6px); }
}

/* BACK BUTTON */
.topbar {
  position: fixed;
  top: 20px;
  left: 20px;
  z-index: 10;
}

.back {
  font-size: 12px;
  text-decoration: none;
  color: rgba(255,255,255,0.7);
}

.back:hover {
  color: #ff0059;
}

/* PAGE */
.page {
  position: relative;
  z-index: 2;
  min-height: 100vh;
  padding: 80px 60px;
}

/* HEADER */
.header {
  max-width: 700px;
  margin-bottom: 60px;
}

.title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(60px, 8vw, 120px);
  letter-spacing: 2px;
}

.desc {
  margin-top: 10px;
  font-size: 13px;
  max-width: 520px;
  color: rgba(255,255,255,0.75);
  line-height: 1.6;
}

/* CHAPTERS */
.chapters {
  display: flex;
  flex-direction: column;
  gap: 16px;
  max-width: 900px;
}

/* CHAPTER ENTRY */
.chapter {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 14px 16px;
  text-decoration: none;
  color: white;

  background: rgba(0,0,0,0.35);
  border: 1px solid rgba(255,255,255,0.08);
  backdrop-filter: blur(6px);

  transition: transform 0.2s ease, background 0.2s ease;
}

/* unstable “signal drift” */
.chapter:nth-child(odd) { transform: translateX(8px); }
.chapter:nth-child(even) { transform: translateX(-6px); }

.chapter:hover {
  transform: translateX(0px) scale(1.02);
  background: rgba(255,0,89,0.25);
  border-color: rgba(255,0,89,0.5);
}

/* thumbnail */
.chapter-thumb {
  width: 64px;
  height: 64px;
  background: rgba(255,255,255,0.08);
  border-radius: 4px;
  flex-shrink: 0;
}

/* text */
.chapter-title {
  font-size: 15px;
}

.chapter-sub {
  font-size: 11px;
  opacity: 0.6;
  margin-top: 2px;
}
</style>
</head>

<body>

<div class="topbar">
  <a class="back" href="https://dieclick.github.io">← BACK</a>
</div>

<div class="page">

  <div class="header">
    <div class="title">TROUBLE SPOT</div>
    <div class="desc">
      A daily illustration novel depicitng an aviation
      faction of girls fighting in no real war.
    </div>
  </div>

  <div class="chapters"></div>

</div>

<script>
fetch("chapters.json")
  .then(res => res.json())
  .then(data => {
    const container = document.querySelector(".chapters");
    container.innerHTML = "";

    data.forEach(ch => {
      const a = document.createElement("a");
      a.className = "chapter";

      // ✅ NEW LINK SYSTEM
      a.href = `/all_comics/viewer.html?chapter=Trouble_spot/${ch.folder}`;

      a.innerHTML = `
        <div class="chapter-thumb"></div>
        <div>
          <div class="chapter-title">${ch.name}</div>
          <div class="chapter-sub">${ch.desc}</div>
        </div>
      `;

      container.appendChild(a);
    });
  })
  .catch(err => {
    console.error("Chapter load failed:", err);
  });
</script>

</body>
</html>
