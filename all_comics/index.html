<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DIECLICK — Comics</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #ff0059;
  font-family: 'Barlow', sans-serif;
}

/* layout */
.page {
  min-height: 100vh;
  display: grid;
  grid-template-columns: 1fr 2fr;
}

/* LEFT PANEL */
.left {
  background: #0d0d0d;
  color: #fff;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  padding: 32px;
}

.title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(80px, 10vw, 140px);
  line-height: 0.9;
  color: #ff0059;
}

.desc {
  font-size: 13px;
  max-width: 340px;
  color: rgba(255,255,255,0.5);
}

/* RIGHT SHELF */
.right {
  display: flex;
  flex-wrap: wrap;
  gap: 40px;
  padding: 60px;
  align-items: flex-start;
  perspective: 1200px;
}

/* COMIC BOOK */
.comic {
  position: relative;
  width: 190px;
  height: 270px;
  text-decoration: none;
  transform-style: preserve-3d;
  transition: transform 0.25s ease;
}

/* COVER */
.comic-cover {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center;
  box-shadow: 0 25px 50px rgba(0,0,0,0.45);
}

/* subtle spine light */
.comic-cover::before {
  content: "";
  position: absolute;
  left: 0;
  top: 0;
  width: 8px;
  height: 100%;
  background: linear-gradient(to right, rgba(255,255,255,0.18), transparent);
}

/* hover = physical motion */
.comic:hover {
  transform: rotateY(-10deg) rotateX(5deg) translateY(-10px) scale(1.04);
}

/* BACK BUTTON */
.topbar {
  position: absolute;
  top: 20px;
  left: 20px;
}

.back {
  font-size: 12px;
  text-decoration: none;
  color: rgba(255,255,255,0.6);
}

.back:hover {
  color: #fff;
}

/* mobile */
@media (max-width: 800px) {
  .page {
    grid-template-columns: 1fr;
  }

  .right {
    justify-content: center;
    padding: 30px;
  }
}
</style>
</head>

<body>

<div class="topbar">
  <a class="back" href="https://dieclick.github.io">← BACK</a>
</div>

<div class="page">

  <!-- LEFT -->
  <div class="left">
    <div class="title">COMICS</div>
    <div class="desc">
      A comic is a form of visual storytelling built as a physical sequence of illustrated pages.
    </div>
  </div>

  <!-- RIGHT -->
<div class="right">

  <a class="comic" href="BLEIN_I/index.html">
    <div class="comic-cover" style="background-image:url('comic_blein_cover.png')"></div>
  </a>

  <a class="comic" href="https://dieclick.github.io/comics/index.html">
    <div class="comic-cover" style="background-image:url('desgreencover.png')"></div>
  </a>

  <a class="comic" href="Trouble_spot/index.html">
    <div class="comic-cover" style="background-image:url('TS_cover.png')"></div>
  </a>

</div>

</div>

</body>
</html>
