<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DIECLICK — Comics</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #ff0059; /* inverted main tone */
  color: #0d0d0d;
  font-family: 'Barlow', sans-serif;
}

/* layout */
.page {
  min-height: 100vh;
  display: grid;
  grid-template-columns: 1fr 2fr;
}

/* LEFT — inverted panel */
.left {
  background: #0d0d0d;
  color: #f0ede8;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  padding: 32px;
}

/* title */
.title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(80px, 10vw, 140px);
  line-height: 0.9;
  color: #ff0059;
}

/* description */
.desc {
  max-width: 360px;
  font-size: 13px;
  color: rgba(255,255,255,0.5);
}

/* RIGHT — comic shelf */
.right {
  padding: 40px;
  display: flex;
  flex-direction: column;
  gap: 18px;
}

/* COMIC BOOK ITEM */
.comic {
  position: relative;
  height: 140px;
  display: flex;
  align-items: center;
  text-decoration: none;
  border: 1px solid rgba(0,0,0,0.15);
  background: rgba(255,255,255,0.15);
  overflow: hidden;
  transition: transform 0.2s ease, background 0.2s ease;
}

/* subtle “stacked book” feel */
.comic::before {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.05);
  transform: translate(6px, 6px);
  z-index: 0;
}

/* cover image */
.comic-bg {
  width: 110px;
  height: 100%;
  background-size: cover;
  background-position: center;
  filter: contrast(110%);
  z-index: 2;
}

/* text area */
.comic-name {
  padding: 0 20px;
  font-size: 16px;
  font-weight: 400;
  letter-spacing: 0.5px;
  z-index: 2;
  color: #0d0d0d;
}

/* hover */
.comic:hover {
  transform: translateY(-4px);
  background: rgba(255,255,255,0.25);
}

/* back */
.topbar {
  position: absolute;
  top: 20px;
  left: 20px;
}

.back {
  font-size: 12px;
  text-decoration: none;
  color: rgba(255,255,255,0.6);
}

.back:hover {
  color: white;
}

/* mobile */
@media (max-width: 700px) {
  .page {
    grid-template-columns: 1fr;
  }

  .left {
    min-height: 220px;
  }

  .comic {
    height: 120px;
  }
}
</style>
</head>

<body>

<div class="topbar">
  <a class="back" href="index.html">← BACK</a>
</div>

<div class="page">

  <!-- LEFT -->
  <div class="left">
    <div class="title">COMICS</div>
    <div class="desc">
      Physical-style illustrated works. Covers first, stories inside.
    </div>
  </div>

  <!-- RIGHT -->
  <div class="right">

    <a class="comic" href="BLEIN_I/index.html">
      <div class="comic-bg" style="background-image:url('comic_blein_cover.png')"></div>
      <div class="comic-name">BLEIN I</div>
    </a>

    <a class="comic" href="https://dieclick.github.io/comics/index.html">
      <div class="comic-bg" style="background-image:url('desgreencover.png')"></div>
      <div class="comic-name">DESTINATA GREEN</div>
    </a>

    <a class="comic" href="Trouble_spot/index.html">
      <div class="comic-bg" style="background-image:url('TS_cover.png')"></div>
      <div class="comic-name">TROUBLE SPOT</div>
    </a>

  </div>

</div>

</body>
</html>
