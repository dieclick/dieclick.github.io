<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DIECLICK — Comics</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #ff0059;
  font-family: 'Barlow', sans-serif;
}

/* layout */
.page {
  min-height: 100vh;
  display: grid;
  grid-template-columns: 1fr 2fr;
}

/* LEFT */
.left {
  background: #0d0d0d;
  color: #fff;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  padding: 32px;
}

.title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(80px, 10vw, 140px);
  color: #ff0059;
  line-height: 0.9;
}

.desc {
  font-size: 13px;
  max-width: 320px;
  color: rgba(255,255,255,0.5);
}

/* RIGHT — shelf */
.right {
  display: flex;
  flex-wrap: wrap;
  gap: 40px;
  padding: 60px;
  align-items: flex-start;
  perspective: 1200px;
}

/* BOOK (upright) */
.comic {
  position: relative;
  width: 180px;
  height: 260px;
  text-decoration: none;
  transform-style: preserve-3d;
  transition: transform 0.25s ease;
}

/* depth stack behind */
.comic::before {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(255,255,255,0.15);
  transform: translate(10px, 10px) rotateY(-6deg);
  z-index: 0;
}

/* second layer */
.comic::after {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(255,255,255,0.08);
  transform: translate(5px, 5px) rotateY(-3deg);
  z-index: 1;
}

/* COVER */
.comic-bg {
  position: relative;
  width: 100%;
  height: 100%;
  background-size: cover;
  background-position: center;
  z-index: 3;
  box-shadow: 0 20px 40px rgba(0,0,0,0.35);
}

/* hover = physical movement */
.comic:hover {
  transform: rotateY(-12deg) rotateX(6deg) translateY(-10px) scale(1.03);
}

/* back */
.topbar {
  position: absolute;
  top: 20px;
  left: 20px;
}

.back {
  font-size: 12px;
  text-decoration: none;
  color: rgba(255,255,255,0.6);
}

.back:hover {
  color: #fff;
}

/* mobile */
@media (max-width: 800px) {
  .page {
    grid-template-columns: 1fr;
  }

  .right {
    justify-content: center;
    padding: 30px;
  }
}
</style>
</head>

<body>

<div class="topbar">
  <a class="back" href="https://dieclick.github.io">← BACK</a>
</div>

<div class="page">

  <!-- LEFT -->
  <div class="left">
    <div class="title">COMICS</div>
    <div class="desc">
      A comic is a form of graphic storytelling that combines sequenced images with text to tell a story, wether real or not.
    </div>
  </div>

  <!-- RIGHT -->
  <div class="right">

    <a class="comic" href="BLEIN_I/index.html">
      <div class="comic-bg" style="background-image:url('comic_blein_cover.png')"></div>
    </a>

    <a class="comic" href="https://dieclick.github.io/comics/index.html">
      <div class="comic-bg" style="background-image:url('desgreencover.png')"></div>
    </a>

    <a class="comic" href="Trouble_spot/index.html">
      <div class="comic-bg" style="background-image:url('TS_cover.png')"></div>
    </a>

  </div>

</div>

</body>
</html>
