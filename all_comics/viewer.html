<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comic</title>

<style>
body {
    margin: 0;
    background: #0d0d0d;
    overflow: hidden;
    font-family: Arial, sans-serif;
}

/* noise */
body::after {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image: url("https://grainy-gradients.vercel.app/noise.svg");
    opacity: 0.08;
}

/* viewer */
.viewer {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    position: relative;
}

.track {
    display: flex;
    height: 100%;
    transition: transform 0.35s ease;
    will-change: transform;
}

.track img {
    width: 100vw;
    height: 100vh;
    object-fit: contain;
    flex-shrink: 0;
    user-select: none;
}

/* vertical mode */
.viewer.vertical {
    overflow-y: auto;
}

.viewer.vertical .track {
    flex-direction: column;
    transform: none !important;
}

/* UI */
.ui {
    position: absolute;
    inset: 0;
    pointer-events: none;
}

.counter {
    position: absolute;
    top: 15px;
    left: 20px;
    font-size: 13px;
    color: white;
    opacity: 0.85;
}

.progress {
    position: fixed;
    bottom: 0;
    left: 0;
    height: 3px;
    width: 0%;
    background: white;
    transition: width 0.2s ease;
    z-index: 10;
}

/* hidden UI */
.ui.hidden { opacity: 0; transition: 0.3s; }
</style>
</head>

<body>

<div class="viewer" id="viewer">
    <div class="track" id="track"></div>
    <div class="ui" id="ui">
        <div class="counter" id="counter"></div>
    </div>
</div>
<div class="progress" id="progress"></div>
<script>
const track = document.getElementById("track");
const viewer = document.getElementById("viewer");
const counter = document.getElementById("counter");
const progress = document.getElementById("progress");

let pages = [];
let current = 0;
let vertical = false;

/* chapter path */
const params = new URLSearchParams(window.location.search);
const chapterPath = params.get("chapter");
const base = "/all_comics/" + chapterPath + "/";

/* LOAD JSON */
fetch(base + "pages.json")
.then(r => r.json())
.then(data => {

    document.title = data.title || "Comic";

    data.pages.forEach((src, i) => {
        const img = new Image();

        img.loading = "eager"; // faster first render
        img.decoding = "async";

        img.src = base + src;

        track.appendChild(img);
        pages.push(img);
    });

    update();
});

function update() {

    if (!vertical) {
        track.style.transform = `translateX(-${current * 100}vw)`;
    }

    counter.textContent = `${current + 1} / ${pages.length}`;

    const percent = pages.length > 1
        ? (current / (pages.length - 1)) * 100
        : 100;

    progress.style.width = percent + "%";

    preload(current);
}

/* preload ONLY neighbors */
function preload(i) {
    [1].forEach(o => {
        const n = i + o;
        if (pages[n]) {
            const img = new Image();
            img.src = pages[n].src;
        }
    });
}

/* navigation */
function next() {
    if (current < pages.length - 1) current++;
    update();
}

function prev() {
    if (current > 0) current--;
    update();
}

/* click navigation */
viewer.addEventListener("click", (e) => {
    const x = e.clientX;
    if (x > window.innerWidth / 2) next();
    else prev();
});

/* mouse wheel navigation */
let wheelLock = false;

window.addEventListener("wheel", (e) => {
    if (vertical) return;

    if (wheelLock) return;
    wheelLock = true;

    if (e.deltaY > 0) next();
    else prev();

    setTimeout(() => wheelLock = false, 300);
});

/* keyboard */
document.addEventListener("keydown", (e) => {
    if (e.key === "ArrowRight") next();
    if (e.key === "ArrowLeft") prev();
});

/* vertical toggle (kept for future use) */
document.addEventListener("keydown", (e) => {
    if (e.key === "v") {
        vertical = !vertical;
        viewer.classList.toggle("vertical");
    }
});

update();
</script>

</body>
</html>
