<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blein</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Russo+One&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  min-height:100vh;background:#0d0d0f;
  color:#ddd;font-family:'IBM Plex Mono',monospace;
  overflow-x:hidden;position:relative;
}
body.light{background:#f0ece0;color:#111;}

.bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.bg-canvas svg{width:100%;height:100%;position:absolute;inset:0;}
body.light .bg-canvas{opacity:0.15;}

body::before{content:"";position:fixed;inset:0;z-index:2;pointer-events:none;
  background:radial-gradient(ellipse 90% 90% at 50% 50%,transparent 20%,rgba(0,0,0,0.8) 100%);}
body.light::before{
  background:radial-gradient(ellipse 90% 90% at 50% 50%,transparent 20%,rgba(240,236,224,0.65) 100%);}

.rain{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden;}
.rain span{position:absolute;top:-10%;width:1px;animation:fall linear infinite;
  background:linear-gradient(to bottom,transparent,rgba(200,200,220,0.09),transparent);}
body.light .rain span{background:linear-gradient(to bottom,transparent,rgba(80,80,100,0.07),transparent);}
@keyframes fall{to{transform:translateY(110vh);}}

.topbar{position:fixed;top:22px;left:24px;z-index:200;}
.back{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:2px;
  text-transform:uppercase;text-decoration:none;color:rgba(180,180,200,0.45);transition:color 0.2s;}
body.light .back{color:rgba(80,80,100,0.55);}
.back:hover{color:#d4a017;}

.page{position:relative;z-index:3;min-height:100vh;padding:72px 52px 100px;}

.header{margin-bottom:60px;max-width:560px;}
.title{font-family:'Russo One',sans-serif;font-size:clamp(72px,12vw,150px);
  letter-spacing:4px;color:#e8e8ec;line-height:0.9;}
body.light .title{color:#1a1820;}

.desc{margin-top:18px;font-size:10px;font-weight:300;letter-spacing:2px;
  color:rgba(200,200,220,0.35);line-height:2.2;max-width:320px;}
body.light .desc{color:rgba(40,40,60,0.45);}

.divide{display:flex;align-items:center;gap:8px;margin-bottom:52px;max-width:700px;}
.d-line{height:1px;flex:1;background:rgba(220,220,240,0.15);}
body.light .d-line{background:rgba(40,40,60,0.15);}
.d-blk{width:32px;height:3px;background:rgba(220,220,240,0.2);}
body.light .d-blk{background:rgba(40,40,60,0.2);}

body.dark, body.light {
  transition: none;
}

.entries{display:flex;flex-direction:column;gap:4px;max-width:700px;}

.entry{display:block;text-decoration:none;color:inherit;position:relative;
  padding:20px 28px 18px 20px;overflow:hidden;cursor:pointer;
  transform:skewX(-8deg);transform-origin:left center;
  transition:transform 0.3s cubic-bezier(0.23,1,0.32,1);}
.entry:hover{transform:skewX(-8deg) translateX(8px);}

.entry-bg{position:absolute;inset:0;background:rgba(10,8,14,0.82);
  border-left:3px solid #d4a017;transition:background 0.3s;}
body.light .entry-bg{background:rgba(240,236,224,0.75);border-left:3px solid #8a5f00;}
.entry:hover .entry-bg{background:rgba(20,15,30,0.92);}
body.light .entry:hover .entry-bg{background:rgba(220,215,200,0.9);}

.entry-content{position:relative;z-index:1;transform:skewX(8deg);}
.entry-row{display:flex;align-items:baseline;gap:14px;}

.entry-num{font-size:9px;letter-spacing:3px;color:#d4a017;opacity:0.7;flex-shrink:0;}
body.light .entry-num{color:#8a5f00;}

.entry-title{font-family:'Russo One',sans-serif;font-size:32px;letter-spacing:3px;
  color:#e8e8ec;line-height:1;transition:color 0.2s;}
body.light .entry-title{color:#1a1820;}
.entry:hover .entry-title{color:#ffee88;}
body.light .entry:hover .entry-title{color:#5f3a00;}

.entry-sub{margin-top:5px;font-size:9px;letter-spacing:2px;font-weight:300;
  color:rgba(200,200,220,0.35);padding-left:38px;}
body.light .entry-sub{color:rgba(40,40,60,0.45);}

.entry:nth-child(1) .entry-bg::after{content:"";position:absolute;top:-40px;right:-40px;
  width:180px;height:180px;opacity:0.12;transform:rotate(35deg);pointer-events:none;
  background:linear-gradient(135deg,#e83060,#ff9020);}
.entry:nth-child(2) .entry-bg::after{content:"";position:absolute;top:-40px;right:-40px;
  width:180px;height:180px;opacity:0.12;transform:rotate(35deg);pointer-events:none;
  background:linear-gradient(135deg,#2060e8,#20e8c0);}
.entry:nth-child(1)::after{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;
  background:linear-gradient(to bottom,#e83060,#ff9020);}
.entry:nth-child(2)::after{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;
  background:linear-gradient(to bottom,#2060e8,#20e8c0);}
</style>
</head>
<body class="dark">

<div class="bg-canvas">
<svg viewBox="0 0 1200 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
  <polygon points="0,0 420,0 180,340 0,280" fill="#e83060" opacity="0.09"/>
  <polygon points="1200,0 1200,500 820,300 950,0" fill="#2060e8" opacity="0.08"/>
  <polygon points="300,900 0,600 0,900" fill="#20c8e8" opacity="0.07"/>
  <polygon points="1200,900 900,900 1100,600" fill="#e8a020" opacity="0.07"/>
  <polygon points="500,200 700,100 780,380 560,420" fill="#9020e8" opacity="0.06"/>
  <polygon points="200,500 400,440 360,700 100,720" fill="#20e860" opacity="0.05"/>
  <line x1="0" y1="180" x2="600" y2="420" stroke="#e83060" stroke-width="1" opacity="0.15"/>
  <line x1="1200" y1="120" x2="500" y2="600" stroke="#2060e8" stroke-width="1" opacity="0.12"/>
  <line x1="0" y1="700" x2="800" y2="200" stroke="#e8c020" stroke-width="0.5" opacity="0.1"/>
  <line x1="300" y1="0" x2="900" y2="900" stroke="#20e8c0" stroke-width="0.5" opacity="0.08"/>
  <polygon points="600,50 640,30 660,80" fill="#ff4080" opacity="0.25"/>
  <polygon points="900,200 930,180 940,230" fill="#40a0ff" opacity="0.2"/>
  <polygon points="150,650 180,630 200,680" fill="#a040ff" opacity="0.2"/>
  <polygon points="1050,700 1080,680 1090,730" fill="#40ffb0" opacity="0.18"/>
</svg>
</div>

<div class="rain" id="rain"></div>
<div class="topbar"><a class="back" href="https://dieclick.github.io">← back</a></div>

<div class="page">
  <div class="header">
    <div class="title">BLEIN</div>
    <div class="desc">An anomaly approaches from the sky. Nobody saw it come.</div>
  </div>
  <div class="divide">
    <div class="d-blk"></div>
    <div class="d-line"></div>
    <div class="d-blk" style="width:8px;opacity:0.5;"></div>
    <div class="d-line" style="flex:0.3;"></div>
  </div>
  <div class="entries" id="entries-container"></div>
</div>

<script>
const rain=document.getElementById("rain");
for(let i=0;i<28;i++){
  const s=document.createElement("span");
  s.style.cssText=`left:${Math.random()*100}%;height:${50+Math.random()*90}px;animation-duration:${1.6+Math.random()*2.4}s;animation-delay:-${Math.random()*4}s;opacity:${0.15+Math.random()*0.4}`;
  rain.appendChild(s);
}

// more frequent shifts — 1.5s to 6s between each
let dark=true;
function shift(){
  dark=!dark;
  document.body.classList.remove('dark', 'light');
document.body.classList.add(dark ? 'dark' : 'light');
  setTimeout(shift, 1500+Math.random()*4500);
}
setTimeout(shift, 2000+Math.random()*3000);

const fallback=[
  {name:"BLEIN",desc:"The collapsed city. Something wakes up.",folder:"blein"},
  {name:"BLEIIN",desc:"Inside the fractal. Before the war.",folder:"bleiin"}
];
function render(data){
  const c=document.getElementById("entries-container");
  c.innerHTML="";
  data.forEach((ch,i)=>{
    const a=document.createElement("a");
    a.className="entry";
    a.href=`/all_comics/viewer.html?chapter=blein/${ch.folder}`;
    a.innerHTML=`<div class="entry-bg"></div><div class="entry-content"><div class="entry-row"><div class="entry-num">0${i+1}</div><div class="entry-title">${ch.name.toUpperCase()}</div></div><div class="entry-sub">${ch.desc}</div></div>`;
    c.appendChild(a);
  });
}
fetch("chapters.json").then(r=>r.json()).then(render).catch(()=>render(fallback));
</script>
</body>
</html>
