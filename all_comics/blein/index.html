<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blein</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Russo+One&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0;}

body{
  min-height:100vh;
  background:#0d0d0f;
  color:#ddd;
  font-family:'IBM Plex Mono',monospace;
  overflow-x:hidden;
  position:relative;
}

/* REMOVE ALL SMOOTH TRANSITIONS */
*{
  transition:none !important;
}

/* THEMES */
body.light{background:#f0ece0;color:#111;}

/* GLITCH FLASH LAYER */
.glitch-flash{
  position:fixed;
  inset:0;
  z-index:999;
  pointer-events:none;
  background:white;
  opacity:0;
}

/* RGB GLITCH */
body.glitching{
  animation:rgbShift 0.12s steps(2,end) 2;
}

@keyframes rgbShift{
  0%{filter:none;}
  25%{filter:hue-rotate(90deg) contrast(1.4);}
  50%{filter:invert(1);}
  75%{filter:hue-rotate(-120deg) saturate(2);}
  100%{filter:none;}
}

/* BACKGROUND */
.bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}
.bg-canvas svg{width:100%;height:100%;position:absolute;inset:0;}
body.light .bg-canvas{opacity:0.15;}

/* RADIAL VIGNETTE */
body::before{
  content:"";
  position:fixed;
  inset:0;
  z-index:2;
  pointer-events:none;
  background:radial-gradient(ellipse 90% 90% at 50% 50%,
    transparent 20%,
    rgba(0,0,0,0.8) 100%);
}
body.light::before{
  background:radial-gradient(ellipse 90% 90% at 50% 50%,
    transparent 20%,
    rgba(240,236,224,0.65) 100%);
}

/* RAIN */
.rain{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden;}
.rain span{
  position:absolute;
  top:-10%;
  width:1px;
  animation:fall linear infinite;
  background:linear-gradient(to bottom,transparent,rgba(200,200,220,0.09),transparent);
}
body.light .rain span{
  background:linear-gradient(to bottom,transparent,rgba(80,80,100,0.07),transparent);
}
@keyframes fall{
  to{transform:translateY(110vh);}
}

/* TOP BAR */
.topbar{position:fixed;top:22px;left:24px;z-index:200;}
.back{
  font-size:10px;
  letter-spacing:2px;
  text-transform:uppercase;
  text-decoration:none;
  color:rgba(180,180,200,0.45);
}
body.light .back{color:rgba(80,80,100,0.55);}
.back:hover{color:#d4a017;}

/* PAGE */
.page{
  position:relative;
  z-index:3;
  min-height:100vh;
  padding:72px 52px 100px;
}

/* HEADER */
.header{margin-bottom:60px;max-width:560px;}

.title{
  font-family:'Russo One',sans-serif;
  font-size:clamp(72px,12vw,150px);
  letter-spacing:4px;
  color:#e8e8ec;
  line-height:0.9;
}
body.light .title{color:#1a1820;}

.desc{
  margin-top:18px;
  font-size:10px;
  letter-spacing:2px;
  color:rgba(200,200,220,0.35);
  line-height:2.2;
  max-width:320px;
}

/* DIVIDER */
.divide{display:flex;align-items:center;gap:8px;margin-bottom:52px;}
.d-line{height:1px;flex:1;background:rgba(220,220,240,0.15);}
body.light .d-line{background:rgba(40,40,60,0.15);}
.d-blk{width:32px;height:3px;background:rgba(220,220,240,0.2);}
body.light .d-blk{background:rgba(40,40,60,0.2);}

/* ENTRIES */
.entries{display:flex;flex-direction:column;gap:4px;max-width:700px;}

.entry{
  display:block;
  text-decoration:none;
  color:inherit;
  position:relative;
  padding:20px 28px 18px 20px;
  overflow:hidden;
  cursor:pointer;
  transform:skewX(-8deg);
}

.entry:hover{transform:skewX(-8deg) translateX(8px);}

.entry-bg{
  position:absolute;
  inset:0;
  background:rgba(10,8,14,0.82);
  border-left:3px solid #d4a017;
}
body.light .entry-bg{
  background:rgba(240,236,224,0.75);
  border-left:3px solid #8a5f00;
}

.entry-content{
  position:relative;
  z-index:1;
  transform:skewX(8deg);
}

.entry-row{display:flex;gap:14px;align-items:baseline;}

.entry-num{
  font-size:9px;
  letter-spacing:3px;
  color:#d4a017;
  opacity:0.7;
}

.entry-title{
  font-family:'Russo One',sans-serif;
  font-size:32px;
  letter-spacing:3px;
  color:#e8e8ec;
}
body.light .entry-title{color:#1a1820;}

.entry-sub{
  margin-top:5px;
  font-size:9px;
  letter-spacing:2px;
  color:rgba(200,200,220,0.35);
  padding-left:38px;
}

/* BACK END GLITCH LINES */
.entry:nth-child(1)::after,
.entry:nth-child(2)::after{
  content:"";
  position:absolute;
  left:0;
  top:0;
  bottom:0;
  width:3px;
}

.entry:nth-child(1)::after{
  background:linear-gradient(to bottom,#e83060,#ff9020);
}
.entry:nth-child(2)::after{
  background:linear-gradient(to bottom,#2060e8,#20e8c0);
}
</style>
</head>

<body class="dark">

<div class="glitch-flash" id="flash"></div>

<div class="bg-canvas">
<svg viewBox="0 0 1200 900">
  <polygon points="0,0 420,0 180,340 0,280" fill="#e83060" opacity="0.09"/>
  <polygon points="1200,0 1200,500 820,300 950,0" fill="#2060e8" opacity="0.08"/>
</svg>
</div>

<div class="rain" id="rain"></div>

<div class="topbar">
  <a class="back" href="https://dieclick.github.io">← back</a>
</div>

<div class="page">
  <div class="header">
    <div class="title">BLEIN</div>
    <div class="desc">An anomaly approaches from the sky. Nobody saw it come.</div>
  </div>

  <div class="divide">
    <div class="d-blk"></div>
    <div class="d-line"></div>
  </div>

  <div class="entries" id="entries-container"></div>
</div>

<script>

/* RAIN */
const rain=document.getElementById("rain");
for(let i=0;i<28;i++){
  const s=document.createElement("span");
  s.style.cssText=`
    left:${Math.random()*100}%;
    height:${50+Math.random()*90}px;
    animation-duration:${1.6+Math.random()*2.4}s;
    animation-delay:-${Math.random()*4}s;
    opacity:${0.15+Math.random()*0.4}`;
  rain.appendChild(s);
}

/* GLITCH SWITCH */
let dark=true;
const flash=document.getElementById("flash");

function glitch(){
  flash.style.opacity="1";
  document.body.classList.add("glitching");

  document.body.style.transform=
    `translate(${(Math.random()-0.5)*10}px, ${(Math.random()-0.5)*10}px)`;

  setTimeout(()=>{
    flash.style.opacity="0";
    document.body.classList.remove("glitching");
    document.body.style.transform="none";
  },80);
}

function shift(){
  dark=!dark;

  glitch();

  setTimeout(()=>{
    document.body.classList.remove('dark','light');
    document.body.classList.add(dark?'dark':'light');
  },40);

  setTimeout(shift,1500+Math.random()*4500);
}

setTimeout(shift,2000+Math.random()*3000);

/* CONTENT */
const fallback=[
  {name:"BLEIN",desc:"The collapsed city. Something wakes up.",folder:"blein"},
  {name:"BLEIIN",desc:"Inside the fractal. Before the war.",folder:"bleiin"}
];

function render(data){
  const c=document.getElementById("entries-container");
  c.innerHTML="";
  data.forEach((ch,i)=>{
    const a=document.createElement("a");
    a.className="entry";
    a.href=`/all_comics/viewer.html?chapter=blein/${ch.folder}`;
    a.innerHTML=`
      <div class="entry-bg"></div>
      <div class="entry-content">
        <div class="entry-row">
          <div class="entry-num">0${i+1}</div>
          <div class="entry-title">${ch.name.toUpperCase()}</div>
        </div>
        <div class="entry-sub">${ch.desc}</div>
      </div>`;
    c.appendChild(a);
  });
}

fetch("chapters.json")
  .then(r=>r.json())
  .then(render)
  .catch(()=>render(fallback));

</script>
</body>
</html>
