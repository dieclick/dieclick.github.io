<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blein</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Russo+One&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0;}
*{transition:none !important;} /* kill fades */

body{
  min-height:100vh;background:#0d0d0f;
  color:#ddd;font-family:'IBM Plex Mono',monospace;
  overflow-x:hidden;position:relative;
}
body.light{background:#f0ece0;color:#111;}

/* GLITCH FLASH */
.glitch-flash{
  position:fixed;inset:0;z-index:999;
  background:white;opacity:0;pointer-events:none;
}

/* RGB glitch */
body.glitching{
  animation:rgbShift 0.12s steps(2,end) 2;
}
@keyframes rgbShift{
  0%{filter:none;}
  25%{filter:hue-rotate(90deg) contrast(1.4);}
  50%{filter:invert(1);}
  75%{filter:hue-rotate(-120deg) saturate(2);}
  100%{filter:none;}
}

/* ===== ORIGINAL STYLES PRESERVED ===== */

.bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.bg-canvas svg{width:100%;height:100%;position:absolute;inset:0;}
body.light .bg-canvas{opacity:0.15;}

body::before{content:"";position:fixed;inset:0;z-index:2;pointer-events:none;
  background:radial-gradient(ellipse 90% 90% at 50% 50%,transparent 20%,rgba(0,0,0,0.8) 100%);}
body.light::before{
  background:radial-gradient(ellipse 90% 90% at 50% 50%,transparent 20%,rgba(240,236,224,0.65) 100%);
}

.rain{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden;}
.rain span{position:absolute;top:-10%;width:1px;animation:fall linear infinite;
  background:linear-gradient(to bottom,transparent,rgba(200,200,220,0.09),transparent);}
body.light .rain span{background:linear-gradient(to bottom,transparent,rgba(80,80,100,0.07),transparent);}
@keyframes fall{to{transform:translateY(110vh);}}

/* TOPBAR BACK BUTTON RESTORED */
.topbar{position:fixed;top:22px;left:24px;z-index:200;}
.back{font-size:10px;letter-spacing:2px;text-transform:uppercase;text-decoration:none;
  color:rgba(180,180,200,0.45);}
body.light .back{color:rgba(80,80,100,0.55);}
.back:hover{color:#d4a017;}

.page{position:relative;z-index:3;min-height:100vh;padding:72px 52px 100px;}

.header{margin-bottom:60px;max-width:560px;}
.title{font-family:'Russo One';font-size:clamp(72px,12vw,150px);letter-spacing:4px;line-height:0.9;}
body.light .title{color:#1a1820;}

.desc{margin-top:18px;font-size:10px;letter-spacing:2px;color:rgba(200,200,220,0.35);line-height:2.2;}

.divide{display:flex;align-items:center;gap:8px;margin-bottom:52px;}
.d-line{height:1px;flex:1;background:rgba(220,220,240,0.15);}
body.light .d-line{background:rgba(40,40,60,0.15);}
.d-blk{width:32px;height:3px;background:rgba(220,220,240,0.2);}

.entries{display:flex;flex-direction:column;gap:4px;max-width:700px;}

.entry{display:block;text-decoration:none;color:inherit;position:relative;
  padding:20px;transform:skewX(-8deg);}
.entry:hover{transform:skewX(-8deg) translateX(8px);}

.entry-bg{position:absolute;inset:0;background:rgba(10,8,14,0.82);}
body.light .entry-bg{background:rgba(240,236,224,0.75);}

.entry-content{position:relative;transform:skewX(8deg);}

.entry-title{font-family:'Russo One';font-size:32px;}
.entry-sub{font-size:9px;color:rgba(200,200,220,0.35);}

/* SCRAMBLE */
.scramble{display:inline-block;}
</style>
</head>

<body class="dark">

<div class="glitch-flash" id="flash"></div>

<!-- FULL SVG RESTORED -->
<div class="bg-canvas">
<svg viewBox="0 0 1200 900">
  <polygon points="0,0 420,0 180,340 0,280" fill="#e83060" opacity="0.09"/>
  <polygon points="1200,0 1200,500 820,300 950,0" fill="#2060e8" opacity="0.08"/>
  <polygon points="300,900 0,600 0,900" fill="#20c8e8" opacity="0.07"/>
  <polygon points="1200,900 900,900 1100,600" fill="#e8a020" opacity="0.07"/>
</svg>
</div>

<div class="rain" id="rain"></div>

<!-- BACK BUTTON BACK -->
<div class="topbar">
  <a class="back" href="https://dieclick.github.io">← back</a>
</div>

<div class="page">
  <div class="header">
    <div class="title scramble">BLEIN</div>
    <div class="desc scramble">An anomaly approaches from the sky. Nobody saw it come.</div>
  </div>

  <div class="divide">
    <div class="d-blk"></div>
    <div class="d-line"></div>
  </div>

  <div class="entries" id="entries-container"></div>
</div>

<script>

/* RAIN */
const rain=document.getElementById("rain");
for(let i=0;i<28;i++){
  const s=document.createElement("span");
  s.style.cssText=`left:${Math.random()*100}%;height:${50+Math.random()*90}px;
  animation-duration:${1.6+Math.random()*2.4}s;
  animation-delay:-${Math.random()*4}s;opacity:${0.15+Math.random()*0.4}`;
  rain.appendChild(s);
}

/* SCRAMBLE */
const CHARS="ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789#@%&*";

function scrambleText(el,d=200){
  const o=el.dataset.o||el.textContent;
  el.dataset.o=o;
  let f=0;
  function u(){
    let out="";
    for(let i=0;i<o.length;i++){
      out+=i<f?o[i]:CHARS[Math.floor(Math.random()*CHARS.length)];
    }
    el.textContent=out;
    f+=0.8;
    if(f<o.length)requestAnimationFrame(u);
    else el.textContent=o;
  }
  u();
}

/* GLITCH SYSTEM */
let dark=true;
const flash=document.getElementById("flash");

function glitch(real=false){

  flash.style.opacity="1";
  document.body.classList.add("glitching");

  document.body.style.transform=
    `translate(${(Math.random()-0.5)*12}px, ${(Math.random()-0.5)*12}px)`;

  document.querySelectorAll(".scramble").forEach(el=>{
    scrambleText(el,120+Math.random()*120);
  });

  setTimeout(()=>{
    flash.style.opacity="0";
    document.body.classList.remove("glitching");
    document.body.style.transform="none";
  },80);

  if(real){
    setTimeout(()=>{
      dark=!dark;
      document.body.classList.remove("dark","light");
      document.body.classList.add(dark?"dark":"light");
    },40);
  }
}

function loop(){
  const real=Math.random()<0.35;
  glitch(real);
  setTimeout(loop,1200+Math.random()*4000);
}

setTimeout(loop,2000);

/* CONTENT */
const fallback=[
  {name:"BLEIN",desc:"The collapsed city. Something wakes up.",folder:"blein"},
  {name:"BLEIIN",desc:"Inside the fractal. Before the war.",folder:"bleiin"}
];

function render(data){
  const c=document.getElementById("entries-container");
  c.innerHTML="";
  data.forEach((ch,i)=>{
    const a=document.createElement("a");
    a.className="entry";
    a.href=`/all_comics/viewer.html?chapter=blein/${ch.folder}`;
    a.innerHTML=`
      <div class="entry-bg"></div>
      <div class="entry-content">
        <div class="entry-title scramble">${ch.name}</div>
        <div class="entry-sub scramble">${ch.desc}</div>
      </div>`;
    c.appendChild(a);
  });
}

fetch("chapters.json").then(r=>r.json()).then(render).catch(()=>render(fallback));

</script>

</body>
</html>
