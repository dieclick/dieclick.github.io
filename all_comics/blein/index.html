<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blein</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Russo+One&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">

<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

html, body{
  overflow-x:hidden;
}

body{
  min-height:100vh;
  background:#0d0d0f;
  color:#ddd;
  font-family:'IBM Plex Mono', monospace;
  position:relative;
  transition:background 0.4s ease, color 0.4s ease;
}

body.light{
  background:#f0ece0;
  color:#111;
}

/* SAFE GLITCH LAYER */
#glitch-layer{
  position:fixed;
  inset:0;
  z-index:5;
  pointer-events:none;
  will-change:transform;
}

/* FLASH */
.glitch-flash{
  position:fixed;
  inset:0;
  z-index:999;
  background:white;
  opacity:0;
  pointer-events:none;
}

/* RGB EFFECT (safe) */
body.glitching{
  animation:rgbShift 0.22s steps(3,end) 2;
}

@keyframes rgbShift{
  0%{filter:none;}
  25%{filter:hue-rotate(90deg);}
  50%{filter:invert(1);}
  75%{filter:hue-rotate(-120deg);}
  100%{filter:none;}
}

/* BACKGROUND */
.bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}
.bg-canvas svg{width:100%;height:100%;position:absolute;}
body.light .bg-canvas{opacity:0.15;}

body::before{
  content:"";
  position:fixed;
  inset:0;
  z-index:2;
  background:radial-gradient(ellipse 90% 90%,transparent 20%,rgba(0,0,0,0.8));
  transition:background 0.4s ease;
}
body.light::before{
  background:radial-gradient(ellipse 90% 90%,transparent 20%,rgba(240,236,224,0.65));
}

/* RAIN */
.rain{position:fixed;inset:0;z-index:1;pointer-events:none;}
.rain span{
  position:absolute;
  top:-10%;
  width:1px;
  animation:fall linear infinite;
  background:linear-gradient(to bottom,transparent,rgba(200,200,220,0.09),transparent);
}
body.light .rain span{
  background:linear-gradient(to bottom,transparent,rgba(80,80,100,0.07),transparent);
}

@keyframes fall{
  to{transform:translateY(110vh);}
}

/* UI */
.topbar{
  position:fixed;
  top:22px;
  left:24px;
  z-index:200;
}

.back{
  font-size:10px;
  letter-spacing:2px;
  text-decoration:none;
  color:rgba(180,180,200,0.45);
  transition:color 0.2s ease;
}

body.light .back{color:rgba(80,80,100,0.55);}
.back:hover{color:#d4a017;}

/* PAGE */
.page{
  position:relative;
  z-index:3;
  padding:72px 52px;
}

.title{
  font-family:'Russo One';
  font-size:clamp(72px,12vw,150px);
  transition:color 0.3s ease;
}

body.light .title{color:#1a1820;}

.desc{
  margin-top:18px;
  font-size:10px;
  color:rgba(200,200,220,0.35);
  transition:color 0.3s ease;
}

body.light .desc{
  color:rgba(40,40,60,0.45);
}

/* ENTRIES */
.entries{
  margin-top:60px;
  max-width:700px;
}

.entry{
  position:relative;
  padding:20px;
  transform:skewX(-8deg);
  display:block;
  color:inherit;
  text-decoration:none;
  transition:transform 0.2s ease;
  z-index:3;
}

.entry:hover{
  transform:skewX(-8deg) translateX(6px);
}

.entry-bg{
  position:absolute;
  inset:0;
  background:rgba(10,8,14,0.82);
  transition:background 0.3s ease;
}

body.light .entry-bg{
  background:rgba(240,236,224,0.75);
}

.entry-content{
  position:relative;
  transform:skewX(8deg);
}

.entry-title{
  font-family:'Russo One';
  font-size:32px;
}

.entry-sub{
  font-size:9px;
  color:rgba(200,200,220,0.35);
}

body.light .entry-sub{
  color:rgba(40,40,60,0.45);
}

/* COLOR STRIPS */
.entry:nth-child(1)::after{
  content:"";
  position:absolute;
  left:0;top:0;bottom:0;width:3px;
  background:linear-gradient(to bottom,#e83060,#ff9020);
}
.entry:nth-child(2)::after{
  content:"";
  position:absolute;
  left:0;top:0;bottom:0;width:3px;
  background:linear-gradient(to bottom,#2060e8,#20e8c0);
}
</style>

</head>

<body class="dark">

<div class="glitch-flash" id="flash"></div>

<div class="bg-canvas">
<svg viewBox="0 0 1200 900">
  <polygon points="0,0 420,0 180,340 0,280" fill="#e83060" opacity="0.09"/>
  <polygon points="1200,0 1200,500 820,300 950,0" fill="#2060e8" opacity="0.08"/>
</svg>
</div>

<div class="rain" id="rain"></div>

<div id="glitch-layer"></div>

<div class="topbar">
  <a class="back" href="https://dieclick.github.io">← back</a>
</div>

<div class="page">
  <div class="title">BLEIN</div>
  <div class="desc">An anomaly approaches from the sky. Nobody saw it come.</div>
  <div class="entries" id="entries-container"></div>
</div>

<script>

/* RAIN */
const rain=document.getElementById("rain");
for(let i=0;i<28;i++){
  const s=document.createElement("span");
  s.style.cssText=`left:${Math.random()*100}%;
  height:${60+Math.random()*80}px;
  animation-duration:${2.2+Math.random()*1.6}s;
  animation-delay:-${Math.random()*4}s;
  opacity:${0.2+Math.random()*0.35}`;
  rain.appendChild(s);
}

/* SCRAMBLE */
const CHARS="ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789#@%&*";

function scramble(el){
  const original=el.dataset.o||el.textContent;
  el.dataset.o=original;

  let out="";
  for(let i=0;i<original.length;i++){
    out+=Math.random()<0.5
      ? original[i]
      : CHARS[Math.floor(Math.random()*CHARS.length)];
  }

  el.textContent=out;

  setTimeout(()=>{ el.textContent=original; },120);
}

/* GLITCH */
let dark=true;
const flash=document.getElementById("flash");
const layer=document.getElementById("glitch-layer");

function glitch(real=false){

  flash.style.opacity="1";
  document.body.classList.add("glitching");

  layer.style.transform=
    `translate(${(Math.random()-0.5)*8}px, ${(Math.random()-0.5)*8}px)`;

  document.querySelectorAll(".title, .desc, .entry-title, .entry-sub")
    .forEach(scramble);

  setTimeout(()=>{
    flash.style.opacity="0";
    document.body.classList.remove("glitching");
    layer.style.transform="none";
  },120);

  if(real){
    setTimeout(()=>{
      dark=!dark;
      document.body.classList.toggle("light", !dark);
    },60);
  }
}

function loop(){
  glitch(Math.random()<0.35);
  setTimeout(loop,1800+Math.random()*2200);
}

setTimeout(loop,2000);

/* CONTENT */
const fallback=[
  {name:"BLEIN",desc:"The collapsed city. Something wakes up.",folder:"blein"},
  {name:"BLEIIN",desc:"Inside the fractal. Before the war.",folder:"bleiin"}
];

function render(data){
  const c=document.getElementById("entries-container");
  c.innerHTML="";
  data.forEach((ch)=>{
    const a=document.createElement("a");
    a.className="entry";
    a.href=`all_comics/viewer.html?chapter=blein/${ch.folder}`;
    a.innerHTML=`
      <div class="entry-bg"></div>
      <div class="entry-content">
        <div class="entry-title">${ch.name}</div>
        <div class="entry-sub">${ch.desc}</div>
      </div>`;
    c.appendChild(a);
  });
}

fetch("chapters.json")
  .then(r=>r.json())
  .then(render)
  .catch(()=>render(fallback));

</script>

</body>
</html>
