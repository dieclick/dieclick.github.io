<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blein</title>
<link href="https://fonts.googleapis.com/css2?family=Russo+One&family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { min-height: 100%; overflow-x: hidden; }

body {
  min-height: 100vh;
  background: #0d0d0f;
  color: #ddd;
  font-family: 'IBM Plex Mono', monospace;
}

/* Light shift state */
body.shifted {
  background: #f0ece0;
  color: #111;
}
body.shifted .vignette {
  background: radial-gradient(ellipse 90% 90% at 50% 50%, transparent 30%, rgba(240,236,224,0.7) 100%);
}
body.shifted .rain span {
  background: linear-gradient(to bottom, transparent, rgba(80,80,100,0.08), transparent);
}
body.shifted .back { color: rgba(60,60,80,0.45); }
body.shifted .tagline { color: rgba(40,40,60,0.45); }
body.shifted .entry { background: rgba(0,0,0,0.04); }
body.shifted .entry:hover { background: rgba(0,0,0,0.07); }
body.shifted .entry-desc { color: rgba(40,40,60,0.4); }
body.shifted .entry-name { color: #111; }
body.shifted .bg { opacity: 0.12; }

/* Glitch RGB */
@keyframes rgb { 0%{filter:none} 33%{filter:hue-rotate(90deg)} 66%{filter:hue-rotate(-90deg)} 100%{filter:none} }
body.glitching { animation: rgb 0.2s steps(3,end); }

.bg { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
.bg svg { width: 100%; height: 100%; }

.vignette {
  position: fixed; inset: 0; z-index: 1; pointer-events: none;
  background: radial-gradient(ellipse 90% 90% at 50% 50%, transparent 30%, rgba(0,0,0,0.75) 100%);
  transition: background 0.3s ease;
}

.rain { position: fixed; inset: 0; z-index: 2; pointer-events: none; }
.rain span {
  position: absolute; top: -10%; width: 1px;
  background: linear-gradient(to bottom, transparent, rgba(200,200,220,0.1), transparent);
  animation: fall linear infinite;
}
@keyframes fall { to { transform: translateY(110vh); } }

.page { position: relative; z-index: 3; padding: 64px 48px; }

.back {
  display: inline-block; margin-bottom: 40px;
  font-size: 10px; letter-spacing: 2px;
  text-decoration: none; color: rgba(180,180,200,0.4);
  transition: color 0.2s;
}
.back:hover { color: #d4a017; }

.title {
  font-family: 'Russo One', sans-serif;
  font-size: clamp(72px, 12vw, 150px);
  line-height: 1;
}

.tagline {
  margin-top: 12px; font-size: 10px;
  color: rgba(200,200,220,0.35); letter-spacing: 1px;
}

.entries { margin-top: 56px; max-width: 680px; display: flex; flex-direction: column; gap: 12px; }

.entry {
  display: block; text-decoration: none; color: inherit;
  padding: 18px 20px;
  background: rgba(255,255,255,0.03);
  border-left: 3px solid #e83060;
  transform: skewX(-6deg);
  transition: transform 0.15s ease, background 0.15s ease;
}
.entry:nth-child(2) { border-left-color: #2060e8; }
.entry:hover { transform: skewX(-6deg) translateX(6px); background: rgba(255,255,255,0.06); }
.entry-inner { transform: skewX(6deg); }
.entry-name { font-family: 'Russo One', sans-serif; font-size: 28px; }
.entry-desc { margin-top: 4px; font-size: 9px; color: rgba(200,200,220,0.35); letter-spacing: 1px; }
</style>
</head>
<body>

<div class="bg">
  <svg viewBox="0 0 1200 900" preserveAspectRatio="xMidYMid slice">
    <polygon points="0,0 420,0 180,340 0,280" fill="#e83060" opacity="0.09"/>
    <polygon points="1200,0 1200,500 820,300 950,0" fill="#2060e8" opacity="0.08"/>
    <polygon points="520,200 760,140 840,320 600,380" fill="#7c3aed" opacity="0.05"/>
    <polygon points="80,500 320,420 360,640 140,700" fill="#00c2ff" opacity="0.04"/>
    <polygon points="700,520 980,460 1040,680 760,740" fill="#22c55e" opacity="0.03"/>
  </svg>
</div>

<div class="vignette"></div>
<div class="rain" id="rain"></div>

<div class="page">
<div class="topbar" onclick="history.back()" style="cursor: pointer;"> 
    <span class="back">← BACK</span> 
</div>
  <div class="title" id="title">BLEIN</div>
  <div class="tagline" id="tagline">An anomaly approaches from the sky. Nobody saw it come.</div>
  <div class="entries" id="entries"></div>
</div>

<script>
// Rain
const rain = document.getElementById('rain');
for (let i = 0; i < 24; i++) {
  const s = document.createElement('span');
  s.style.cssText = `left:${Math.random()*100}%;height:${60+Math.random()*80}px;opacity:${0.15+Math.random()*0.3};animation-duration:${2+Math.random()*2}s;animation-delay:-${Math.random()*4}s`;
  rain.appendChild(s);
}

// Chapters
const fallback = [
  { name: "BLEIN",  desc: "The collapsed city. Something wakes up.", folder: "blein" },
  { name: "BLEIIN", desc: "Inside the fractal. Before the war.",     folder: "bleiin" }
];

function render(data) {
  const c = document.getElementById('entries');
  c.innerHTML = '';
  data.forEach(ch => {
    const a = document.createElement('a');
    a.className = 'entry';
    a.href = `/all_comics/viewer.html?chapter=blein/${ch.folder}`;
    a.innerHTML = `<div class="entry-inner"><div class="entry-name">${ch.name}</div><div class="entry-desc">${ch.desc}</div></div>`;
    c.appendChild(a);
  });
}

fetch('chapters.json').then(r => r.json()).then(render).catch(() => render(fallback));

// Glitch + reality shift
const CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789#@%&*';

function scramble(el) {
  const orig = el.dataset.orig || el.textContent;
  el.dataset.orig = orig;
  el.textContent = [...orig].map(c => Math.random() < 0.5 ? c : CHARS[Math.random()*CHARS.length|0]).join('');
  setTimeout(() => el.textContent = orig, 110);
}

function glitch(doShift) {
  document.body.classList.add('glitching');
  document.querySelectorAll('.title, .tagline, .entry-name, .entry-desc').forEach(scramble);

  if (doShift) {
    // snap to white world
    document.body.classList.add('shifted');
    // hold it briefly, then snap back
    setTimeout(() => {
      document.body.classList.remove('shifted');
    }, 320 + Math.random() * 280);
  }

  setTimeout(() => document.body.classList.remove('glitching'), 200);
  setTimeout(() => glitch(Math.random() < 0.3), 1800 + Math.random() * 2400);
}

setTimeout(() => glitch(false), 2000);
</script>
</body>
</html>
