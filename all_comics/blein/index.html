<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blein</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Russo+One&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0;}

/* NO SMOOTH TRANSITIONS */
*{transition:none !important;}

body{
  min-height:100vh;
  background:#0d0d0f;
  color:#ddd;
  font-family:'IBM Plex Mono',monospace;
  overflow-x:hidden;
  position:relative;
}

body.light{background:#f0ece0;color:#111;}

/* GLITCH FLASH */
.glitch-flash{
  position:fixed;
  inset:0;
  z-index:999;
  background:white;
  opacity:0;
  pointer-events:none;
}

/* RGB SHIFT */
body.glitching{
  animation:rgbShift 0.12s steps(2,end) 2;
}
@keyframes rgbShift{
  0%{filter:none;}
  25%{filter:hue-rotate(90deg) contrast(1.4);}
  50%{filter:invert(1);}
  75%{filter:hue-rotate(-120deg) saturate(2);}
  100%{filter:none;}
}

/* BACKGROUND */
.bg-canvas{position:fixed;inset:0;z-index:0;}
.bg-canvas svg{width:100%;height:100%;position:absolute;}
body.light .bg-canvas{opacity:0.15;}

/* VIGNETTE */
body::before{
  content:"";
  position:fixed;
  inset:0;
  z-index:2;
  pointer-events:none;
  background:radial-gradient(ellipse 90% 90%,transparent 20%,rgba(0,0,0,0.8) 100%);
}
body.light::before{
  background:radial-gradient(ellipse 90% 90%,transparent 20%,rgba(240,236,224,0.65) 100%);
}

/* RAIN */
.rain{position:fixed;inset:0;z-index:1;pointer-events:none;}
.rain span{
  position:absolute;
  top:-10%;
  width:1px;
  animation:fall linear infinite;
  background:linear-gradient(to bottom,transparent,rgba(200,200,220,0.09),transparent);
}
body.light .rain span{
  background:linear-gradient(to bottom,transparent,rgba(80,80,100,0.07),transparent);
}
@keyframes fall{to{transform:translateY(110vh);}}

/* PAGE */
.page{position:relative;z-index:3;padding:72px 52px 100px;}

.title{
  font-family:'Russo One';
  font-size:clamp(72px,12vw,150px);
  letter-spacing:4px;
}
body.light .title{color:#1a1820;}

.desc{
  font-size:10px;
  letter-spacing:2px;
  opacity:0.4;
  margin-top:18px;
}

.entries{margin-top:60px;max-width:700px;}

.entry{
  display:block;
  margin-bottom:4px;
  padding:20px;
  transform:skewX(-8deg);
  text-decoration:none;
  color:inherit;
  position:relative;
}

.entry-bg{
  position:absolute;
  inset:0;
  background:rgba(10,8,14,0.82);
}
body.light .entry-bg{
  background:rgba(240,236,224,0.75);
}

.entry-content{
  transform:skewX(8deg);
  position:relative;
}

.entry-title{
  font-family:'Russo One';
  font-size:32px;
}

.entry-sub{
  font-size:9px;
  opacity:0.5;
}

/* SCRAMBLE TARGET */
.scramble{
  display:inline-block;
}
</style>
</head>

<body class="dark">

<div class="glitch-flash" id="flash"></div>

<div class="bg-canvas">
<svg viewBox="0 0 1200 900">
  <polygon points="0,0 420,0 180,340 0,280" fill="#e83060" opacity="0.09"/>
</svg>
</div>

<div class="rain" id="rain"></div>

<div class="page">
  <div class="title scramble">BLEIN</div>
  <div class="desc scramble">An anomaly approaches from the sky. Nobody saw it come.</div>

  <div class="entries" id="entries-container"></div>
</div>

<script>

/* RAIN */
const rain=document.getElementById("rain");
for(let i=0;i<28;i++){
  const s=document.createElement("span");
  s.style.cssText=`left:${Math.random()*100}%;height:${50+Math.random()*90}px;animation-duration:${1.6+Math.random()*2.4}s;animation-delay:-${Math.random()*4}s;opacity:${0.15+Math.random()*0.4}`;
  rain.appendChild(s);
}

/* SCRAMBLE */
const CHARS="ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789#@%&*";

function scrambleText(el,duration=200){
  const original=el.dataset.original||el.textContent;
  el.dataset.original=original;

  let frame=0;

  function update(){
    let out="";
    for(let i=0;i<original.length;i++){
      if(i<frame) out+=original[i];
      else out+=CHARS[Math.floor(Math.random()*CHARS.length)];
    }
    el.textContent=out;
    frame+=0.8;

    if(frame<original.length){
      requestAnimationFrame(update);
    }else{
      el.textContent=original;
    }
  }

  update();
}

/* GLITCH SYSTEM */
let dark=true;
const flash=document.getElementById("flash");

function glitch(real=false){

  flash.style.opacity="1";
  document.body.classList.add("glitching");

  document.body.style.transform=
    `translate(${(Math.random()-0.5)*12}px, ${(Math.random()-0.5)*12}px)`;

  document.querySelectorAll(".scramble").forEach(el=>{
    scrambleText(el,120+Math.random()*120);
  });

  setTimeout(()=>{
    flash.style.opacity="0";
    document.body.classList.remove("glitching");
    document.body.style.transform="none";
  },80);

  if(real){
    setTimeout(()=>{
      dark=!dark;
      document.body.classList.remove("dark","light");
      document.body.classList.add(dark?"dark":"light");
    },40);
  }
}

function loop(){

  const real=Math.random()<0.3; // 30% real switch

  glitch(real);

  setTimeout(loop,1200+Math.random()*4000);
}

setTimeout(loop,2000);

/* CONTENT */
const fallback=[
  {name:"BLEIN",desc:"The collapsed city. Something wakes up.",folder:"blein"},
  {name:"BLEIIN",desc:"Inside the fractal. Before the war.",folder:"bleiin"}
];

function render(data){
  const c=document.getElementById("entries-container");
  c.innerHTML="";
  data.forEach((ch,i)=>{
    const a=document.createElement("a");
    a.className="entry";
    a.href=`/all_comics/viewer.html?chapter=blein/${ch.folder}`;
    a.innerHTML=`
      <div class="entry-bg"></div>
      <div class="entry-content">
        <div class="entry-title scramble">${ch.name}</div>
        <div class="entry-sub scramble">${ch.desc}</div>
      </div>`;
    c.appendChild(a);
  });
}

fetch("chapters.json")
  .then(r=>r.json())
  .then(render)
  .catch(()=>render(fallback));

</script>

</body>
</html>
