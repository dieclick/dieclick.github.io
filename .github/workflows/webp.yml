name: Convert PNGs to WebP

on:
  push:
    branches:
      - main

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install webp
        run: sudo apt-get install -y webp

      - name: Convert PNGs to WebP
        run: |
          find all_comics -name "*.png" | while read f; do
            webp="${f%.png}.webp"
            if [ ! -f "$webp" ]; then
              cwebp "$f" -o "$webp"
            fi
          done

      - name: Update pages.json files
        run: |
          find all_comics -name "pages.json" | while read f; do
            sed -i 's/\.png/.webp/g' "$f"
          done

      - name: Commit
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Auto convert PNGs to WebP" || echo "Nothing to commit"
          git push